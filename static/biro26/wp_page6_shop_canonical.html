<script>
/* RO: SINCRONIZAREA limbii subsolului cu comutatorul RO·RU·EN din magazin
   (iframe, aceeasi origine): magazinul scrie biro26_lang in localStorage,
   pagina-parinte traduce etichetele si linkurile subsolului catre paginile
   WordPress standard cu sufix -ru/-en. Meniurile raman editabile normal in
   WP (Aspect -> Editor -> Footer). */
(function () {
  var TR = {
    'Despre noi': {ru: 'О нас', en: 'About us'},
    'Contacte': {ru: 'Контакты', en: 'Contacts'},
    'Livrare': {ru: 'Доставка', en: 'Delivery'},
    'Retur produse': {ru: 'Возврат товаров', en: 'Product returns'},
    'Termeni și condiții': {ru: 'Условия использования', en: 'Terms and Conditions'},
    'Politica de confidențialitate': {ru: 'Политика конфиденциальности', en: 'Privacy Policy'},
    'Metode de plată': {ru: 'Способы оплаты', en: 'Payment methods'},
    'COMPANIE': {ru: 'КОМПАНИЯ', en: 'COMPANY'},
    'INFORMAȚII': {ru: 'ИНФОРМАЦИЯ', en: 'INFORMATION'},
    'CONTACTE': {ru: 'КОНТАКТЫ', en: 'CONTACTS'}
  };
  function apply() {
    var l = 'ro';
    try { l = localStorage.getItem('biro26_lang') || 'ro'; } catch (e) {}
    document.querySelectorAll('footer a, footer h2, footer h3').forEach(function (el) {
      if (!el.dataset.roLabel) el.dataset.roLabel = el.textContent.trim();
      var base = el.dataset.roLabel, tr = TR[base];
      if (tr) el.textContent = (l !== 'ro' && tr[l]) ? tr[l] : base;
      if (el.tagName === 'A' && tr) {
        if (!el.dataset.roHref) el.dataset.roHref = el.getAttribute('href') || '';
        try {
          var u = new URL(el.dataset.roHref, location.origin);
          var m = u.pathname.match(/^\/([a-z0-9-]+)\/?$/);
          if (m) el.setAttribute('href', l === 'ro' ? el.dataset.roHref
                                                    : '/' + m[1] + '-' + l + '/');
        } catch (e) {}
      }
    });
  }
  /* RO: scriptul e in continut, INAINTEA subsolului in DOM — aplicam
     dupa ce documentul e gata */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', apply);
  } else { apply(); }
  window.addEventListener('storage', function (e) {
    if (!e || e.key === 'biro26_lang') apply();
  });
})();
</script>

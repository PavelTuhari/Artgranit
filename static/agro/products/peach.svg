<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="pcg" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#ffd8a8"/>
      <stop offset="40%" stop-color="#ff922b"/>
      <stop offset="80%" stop-color="#e8590c"/>
      <stop offset="100%" stop-color="#d9480f"/>
    </radialGradient>
    <radialGradient id="pch" cx="38%" cy="30%" r="25%">

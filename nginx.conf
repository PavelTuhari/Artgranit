# Nginx configuration for Artgranit with HTTPS
# This file should be copied to /etc/nginx/sites-available/artgranit

upstream artgranit_backend {
    # Flask app runs on localhost:3003 (or 8000 in REMOTE mode)
    server 127.0.0.1:3003;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 92.5.3.187;
    
    # Let's Encrypt certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 92.5.3.187;
    
    # SSL certificates (generated by certbot)
    ssl_certificate /etc/letsencrypt/live/92.5.3.187/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/92.5.3.187/privkey.pem;
    
    # SSL configuration (hardened)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Proxy settings
    client_max_body_size 16M;
    
    location / {
        proxy_pass http://artgranit_backend;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static files (if needed)
    location /static/ {
        proxy_pass http://artgranit_backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biro26 — Back-office</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --menu-h: 32px;
  --status-h: 22px;
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --accent: #4f8ef7;
  --accent2: #7c6af7;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --text: #e2e8f0;
  --text-dim: #7c8ba0;
  --border: #2d3a4f;

  --c-bg: #f8fafc;
  --c-text: #1e293b;
  --c-border: #e2e8f0;
  --c-blue: #1d4ed8;
  --c-blue-lt: #dbeafe;
  --c-gray: #475569;
  --c-green: #15803d;
  --c-green-lt: #dcfce7;
  --c-red: #dc2626;
  --c-red-lt: #fee2e2;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
}

/* ── MENU BAR ──────────────────────────────────────── */
.menu-bar {
  height: var(--menu-h);
  background: #0d0d1a;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 10px; gap: 2px;
  flex-shrink: 0; z-index: 200;
  user-select: none;
}
.menu-logo {
  display: flex; align-items: center; gap: 8px;
  margin-right: 10px;
  font-weight: 700; font-size: 13px; color: var(--accent);
  letter-spacing: .03em;
}
.menu-logo .logo-badge {
  background: var(--accent); color: #fff;
  border-radius: 3px; padding: 1px 6px;
  font-size: 11px; font-weight: 700;
}
.menu-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.menu-back {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; font-size: 12px;
  color: var(--accent); border-radius: 3px;
  cursor: pointer; text-decoration: none;
  transition: background .12s;
}
.menu-back:hover { background: rgba(79,142,247,.15); }
.menu-profile {
  font-size: 11px; color: #a5f3fc;
  background: rgba(165,243,252,.1);
  border-radius: 3px; padding: 2px 8px;
}

/* lang switcher */
.lang-switch { display: flex; gap: 2px; background: rgba(255,255,255,.06); border-radius: 5px; padding: 2px; }
.lang-btn {
  border: none; background: transparent; color: var(--text-dim);
  font-size: 11px; font-weight: 700; padding: 3px 9px;
  border-radius: 4px; cursor: pointer; transition: background .12s, color .12s;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active { background: var(--accent); color: #fff; }

/* ── APP SHELL ─────────────────────────────────────── */
.app-shell {
  display: flex; flex-direction: column;
  height: calc(100vh - var(--menu-h) - var(--status-h));
  overflow: hidden;
}

/* ── TAB STRIP ─────────────────────────────────────── */
.tab-strip {
  display: flex; align-items: center; gap: 2px;
  background: #fff; border-bottom: 1px solid var(--c-border);
  padding: 0 12px; height: 42px; flex-shrink: 0;
  overflow-x: auto;
}
.tab-btn {
  padding: 9px 16px; font-size: 12.5px; font-weight: 600;
  color: var(--c-gray); cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap; transition: color .12s, border-color .12s;
}
.tab-btn:hover { color: var(--c-blue); }
.tab-btn.active { color: var(--c-blue); border-bottom-color: var(--c-blue); }

/* ── MAIN AREA ─────────────────────────────────────── */
.main-area { flex: 1; min-width: 0; overflow: hidden; background: var(--c-bg); display: flex; flex-direction: column; }
.content-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 18px 20px; }
.panel { display: none; }
.panel.active { display: block; }

/* ── SECTION HEADER ────────────────────────────────── */
.sec-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.sec-header h2 { font-size: 15px; font-weight: 700; color: var(--c-text); }
.sec-header .count {
  background: var(--c-blue-lt); color: var(--c-blue);
  border-radius: 10px; padding: 1px 8px; font-size: 11px; font-weight: 700;
}
.sec-header .sp { flex: 1; }

/* ── FILTER BAR ────────────────────────────────────── */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center;
  background: #fff; border: 1px solid var(--c-border); border-radius: 8px; padding: 10px 12px;
}
.filter-bar label { font-size: 11px; color: var(--c-gray); font-weight: 600; }
.f-input, .f-select {
  padding: 6px 9px; font-size: 12px;
  border: 1px solid var(--c-border); border-radius: 5px;
  outline: none; color: var(--c-text); background: #fff;
}
.f-input:focus, .f-select:focus { border-color: var(--c-blue); }
.f-input.w-search { width: 200px; }
.f-input.w-sm { width: 90px; }
.f-input.w-date { width: 130px; }

/* ── BUTTONS ───────────────────────────────────────── */
.btn {
  padding: 6px 13px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--c-border); border-radius: 5px;
  background: #fff; color: var(--c-text); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background .12s, border-color .12s;
}
.btn:hover { background: #f1f5f9; border-color: #94a3b8; }
.btn.primary { background: var(--c-blue); color: #fff; border-color: var(--c-blue); }
.btn.primary:hover { background: #1e40af; }
.btn.danger { color: var(--c-red); border-color: #fecaca; }
.btn.danger:hover { background: #fef2f2; }
.btn.danger.solid { background: var(--c-red); color: #fff; border-color: var(--c-red); }
.btn.danger.solid:hover { background: #b91c1c; }
.btn.success { color: var(--c-green); border-color: #bbf7d0; }
.btn.success:hover { background: #f0fdf4; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }

/* ── DATA TABLE ────────────────────────────────────── */
.data-table-wrap {
  background: #fff; border: 1px solid var(--c-border);
  border-radius: 8px; overflow: auto; margin-bottom: 16px;
  max-height: 460px;
}
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th {
  background: #f8fafc; color: var(--c-gray);
  font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: .03em;
  padding: 8px 10px; border-bottom: 1px solid var(--c-border);
  text-align: left; white-space: nowrap;
  position: sticky; top: 0; z-index: 1;
}
.data-table td { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; color: #1e293b; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #f8fafc; }
.data-table tr.row-selected td { background: #eff6ff; }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.data-table .td-actions { white-space: nowrap; text-align: right; }
.btn-sm {
  padding: 3px 8px; font-size: 11px;
  border: 1px solid var(--c-border); border-radius: 3px; cursor: pointer;
  background: #fff; color: var(--c-text); transition: background .1s;
}
.btn-sm:hover { background: #f1f5f9; }
.edit-input {
  width: 100%; min-width: 70px; padding: 3px 5px; font-size: 12px;
  border: 1px solid var(--c-border); border-radius: 3px; outline: none;
}
.edit-input:focus { border-color: var(--c-blue); background: #fff7ed; }

/* ── BADGE ─────────────────────────────────────────── */
.badge { display: inline-block; border-radius: 10px; padding: 2px 8px; font-size: 10px; font-weight: 700; }
.badge-new      { background: var(--c-blue-lt); color: var(--c-blue); }
.badge-indict   { background: var(--c-green-lt); color: var(--c-green); }
.badge-conflict { background: var(--c-red-lt); color: var(--c-red); }
.badge-default  { background: #f1f5f9; color: var(--c-gray); }

/* ── REPORT PANEL (monospace output) ──────────────── */
.report-panel {
  background: #0f172a; color: #d1fae5;
  border-radius: 8px; padding: 12px 14px;
  font-family: 'SF Mono', Consolas, Menlo, monospace;
  font-size: 11.5px; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
  max-height: 280px; overflow-y: auto;
  margin-bottom: 16px;
}
.report-panel:empty::before { content: attr(data-empty); color: #64748b; font-style: italic; }
.report-panel .ln-err { color: #fca5a5; }
.report-panel .ln-ok { color: #86efac; }

/* ── CARD ──────────────────────────────────────────── */
.card {
  background: #fff; border: 1px solid var(--c-border); border-radius: 8px;
  padding: 16px; margin-bottom: 16px;
}
.card h3 {
  font-size: 13px; font-weight: 700; color: var(--c-text);
  margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--c-border);
}

/* ── TWO COLUMN LAYOUT ─────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; align-items: start; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }

/* ── DETAIL CARD (univers) ─────────────────────────── */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; }
.detail-field { font-size: 12px; }
.detail-field .df-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
  color: var(--c-gray); margin-bottom: 1px;
}
.detail-field .df-val { color: var(--c-text); font-weight: 600; word-break: break-word; }
.detail-section-title {
  font-size: 11px; font-weight: 700; color: var(--c-blue);
  text-transform: uppercase; letter-spacing: .04em;
  margin: 14px 0 8px; padding-top: 10px; border-top: 1px dashed var(--c-border);
}
.detail-section-title:first-child { margin-top: 0; padding-top: 0; border-top: none; }

/* ── FORM ──────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 11px; font-weight: 600; color: var(--c-gray); }
.form-group input, .form-group select {
  padding: 6px 9px; font-size: 12px;
  border: 1px solid var(--c-border); border-radius: 5px; outline: none;
  font-family: inherit; color: var(--c-text);
}
.form-group input:focus, .form-group select:focus { border-color: var(--c-blue); }
.form-group input.invalid { border-color: var(--c-red); background: #fef2f2; }
.form-actions { display: flex; gap: 8px; margin-top: 14px; }

/* ── ALERT ─────────────────────────────────────────── */
.alert { padding: 10px 14px; border-radius: 6px; font-size: 12.5px; margin-bottom: 14px; line-height: 1.5; }
.alert-info { background: var(--c-blue-lt); border-left: 3px solid var(--c-blue); }
.alert-warn { background: #fefce8; border-left: 3px solid #ca8a04; }
.alert-ok { background: var(--c-green-lt); border-left: 3px solid var(--c-green); }
.alert-err { background: var(--c-red-lt); border-left: 3px solid var(--c-red); }

/* ── MODAL (small forms: merge groups, new profile) ──── */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 500;
  align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: #fff; border-radius: 10px;
  width: 440px; max-width: 92vw; max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.modal-header {
  padding: 14px 18px; border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center; gap: 10px;
}
.modal-header h3 { font-size: 14px; font-weight: 700; flex: 1; }
.modal-close {
  width: 26px; height: 26px; border-radius: 50%; border: none;
  background: #f1f5f9; cursor: pointer; font-size: 15px; color: var(--c-gray);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: #e2e8f0; }
.modal-body { padding: 18px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--c-border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── TOAST ─────────────────────────────────────────── */
.toast-container { position: fixed; bottom: 28px; right: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 16px; border-radius: 6px; font-size: 12px; font-weight: 600;
  background: #1e293b; color: #fff; box-shadow: 0 4px 12px rgba(0,0,0,.3);
  animation: slideIn .2s ease; max-width: 340px;
}
.toast.ok { background: var(--c-green); }
.toast.err { background: var(--c-red); }
@keyframes slideIn { from { transform: translateX(110%); } to { transform: translateX(0); } }

/* ── EMPTY STATE ───────────────────────────────────── */
.empty-state { text-align: center; padding: 30px 20px; color: var(--c-gray); }
.empty-state .es-icon { font-size: 30px; margin-bottom: 8px; }

/* ── STATUS BAR ────────────────────────────────────── */
.status-bar {
  height: var(--status-h); background: var(--c-blue); color: #fff;
  display: flex; align-items: center; padding: 0 14px; gap: 20px;
  font-size: 11px; flex-shrink: 0;
}
.status-bar .sb-right { margin-left: auto; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(100,116,139,.3); border-radius: 3px; }

.mono { font-family: 'SF Mono', Consolas, Menlo, monospace; }
.muted { color: var(--c-gray); }
.req { color: var(--c-red); }
</style>
</head>
<body>

<!-- ── MENU BAR ──────────────────────────────────────────── -->
<div class="menu-bar">
  <div class="menu-logo">
    <span class="logo-badge">B26</span>
    <span id="t-app-title">Biro26 — Back-office</span>
  </div>
  <span class="menu-profile" id="active-profile-indicator" style="display:none"></span>
  <div class="menu-right">
    <div class="lang-switch">
      <button class="lang-btn" id="lang-ru" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" id="lang-ro" onclick="setLang('ro')">RO</button>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
    </div>
    <a class="menu-back" href="/UNA.md/orasldev/biro26">← <span id="t-back">Biro26</span></a>
  </div>
</div>

<!-- ── APP SHELL ─────────────────────────────────────────── -->
<div class="app-shell">

  <!-- TAB STRIP -->
  <div class="tab-strip">
    <div class="tab-btn active" id="tab-source" onclick="showTab('source')" data-i18n="tab_source"></div>
    <div class="tab-btn" id="tab-dict" onclick="showTab('dict')" data-i18n="tab_dict"></div>
    <div class="tab-btn" id="tab-groups" onclick="showTab('groups')" data-i18n="tab_groups"></div>
    <div class="tab-btn" id="tab-prices" onclick="showTab('prices')" data-i18n="tab_prices"></div>
    <div class="tab-btn" id="tab-mapping" onclick="showTab('mapping')" data-i18n="tab_mapping"></div>
  </div>

  <div class="main-area">
    <div class="content-area">

      <!-- ══════════════════════════════════════════════════ -->
      <!-- TAB 1: SURSĂ (BIRO26_GOODS)                       -->
      <!-- ══════════════════════════════════════════════════ -->
      <div class="panel active" id="panel-source">
        <div class="sec-header">
          <h2 data-i18n="src_title"></h2>
          <span class="count" id="src-count">0</span>
        </div>

        <div class="filter-bar">
          <input type="text" class="f-input w-search" id="src-search" data-i18n-ph="f_search" oninput="debounceLoadGoods()">
          <label data-i18n="f_brand"></label>
          <select class="f-select" id="src-brand" onchange="loadGoods()">
            <option value="" data-i18n="f_all"></option>
          </select>
          <label data-i18n="f_furnizor"></label>
          <select class="f-select" id="src-furnizor" onchange="loadGoods()">
            <option value="" data-i18n="f_all"></option>
          </select>
          <label data-i18n="f_status"></label>
          <select class="f-select" id="src-status" onchange="loadGoods()">
            <option value="" data-i18n="f_all"></option>
            <option value="NEW" data-i18n="status_new"></option>
            <option value="IN_DICT" data-i18n="status_indict"></option>
            <option value="CONFLICT" data-i18n="status_conflict"></option>
          </select>
          <button class="btn" onclick="loadGoods()" data-i18n="f_apply"></button>
        </div>

        <div class="btn-row">
          <button class="btn primary" onclick="runGoodsAction('validate')" data-i18n="act_validate"></button>
          <button class="btn primary" onclick="runGoodsAction('prepare')" data-i18n="act_prepare"></button>
          <button class="btn primary" onclick="runGoodsAction('assign-keys')" data-i18n="act_assignkeys"></button>
        </div>

        <div class="report-panel" id="src-report" data-empty=""></div>

        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr>
              <th data-i18n="col_articol"></th>
              <th data-i18n="col_denumire"></th>
              <th data-i18n="col_brand"></th>
              <th data-i18n="col_furnizor"></th>
              <th class="num" data-i18n="col_angro"></th>
              <th class="num" data-i18n="col_ionline"></th>
              <th class="num" data-i18n="col_retail1"></th>
              <th class="num" data-i18n="col_stoc"></th>
              <th data-i18n="col_codunivers"></th>
              <th data-i18n="col_status"></th>
            </tr></thead>
            <tbody id="src-body">
              <tr><td colspan="10"><div class="empty-state"><div class="es-icon">📦</div><p data-i18n="loading"></p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ══════════════════════════════════════════════════ -->
      <!-- TAB 2: NOMENCLATOR (TMS_UNIVERS)                  -->
      <!-- ══════════════════════════════════════════════════ -->
      <div class="panel" id="panel-dict">
        <div class="sec-header">
          <h2 data-i18n="dict_title"></h2>
          <span class="count" id="dict-count">0</span>
        </div>

        <div class="filter-bar">
          <input type="text" class="f-input w-search" id="dict-search" data-i18n-ph="f_search" oninput="debounceLoadUnivers()">
          <label data-i18n="f_gr1"></label>
          <input type="text" class="f-input w-sm" id="dict-gr1" oninput="debounceLoadUnivers()">
          <label data-i18n="f_arhiv"></label>
          <select class="f-select" id="dict-arhiv" onchange="loadUnivers()">
            <option value="active" data-i18n="arhiv_active"></option>
            <option value="archived" data-i18n="arhiv_archived"></option>
          </select>
          <button class="btn" onclick="loadUnivers()" data-i18n="f_apply"></button>
        </div>

        <div class="btn-row">
          <button class="btn primary" onclick="confirmAndRun('univers_import','/api/biro26/univers/import',null,'dict-report')" data-i18n="act_import_dict"></button>
          <button class="btn danger" onclick="archiveSelectedUnivers()" data-i18n="act_archive"></button>
          <button class="btn" onclick="confirmAndRun('univers_fix','/api/biro26/univers/fix-confusables',{},'dict-report')" data-i18n="act_fixconfus"></button>
        </div>

        <div class="report-panel" id="dict-report" data-empty=""></div>

        <div class="two-col">
          <div>
            <div class="data-table-wrap">
              <table class="data-table">
                <thead><tr>
                  <th data-i18n="col_cod"></th>
                  <th data-i18n="col_codvechi"></th>
                  <th data-i18n="col_denumirea"></th>
                  <th data-i18n="col_gr1"></th>
                  <th data-i18n="col_um"></th>
                  <th data-i18n="col_isarhiv"></th>
                </tr></thead>
                <tbody id="dict-body">
                  <tr><td colspan="6"><div class="empty-state"><div class="es-icon">📚</div><p data-i18n="loading"></p></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="card" id="dict-detail-card">
            <h3 data-i18n="dict_detail_title"></h3>
            <div id="dict-detail-body">
              <div class="empty-state"><p data-i18n="dict_detail_empty"></p></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ══════════════════════════════════════════════════ -->
      <!-- TAB 3: GRUPE / FURNIZORI                          -->
      <!-- ══════════════════════════════════════════════════ -->
      <div class="panel" id="panel-groups">
        <div class="sec-header">
          <h2 data-i18n="grp_title"></h2>
          <span class="count" id="grp-count">0</span>
        </div>

        <div class="filter-bar">
          <label data-i18n="f_codprice"></label>
          <input type="number" class="f-input w-sm" id="grp-codprice" value="1" min="1" onchange="loadGroups()">
          <button class="btn" onclick="loadGroups()" data-i18n="f_apply"></button>
        </div>

        <div class="btn-row">
          <button class="btn primary" onclick="confirmAndRun('grp_import','/api/biro26/groups/import',()=>({codprice:Number(document.getElementById('grp-codprice').value||1)}),'grp-report')" data-i18n="act_import_groups"></button>
          <button class="btn" onclick="openMergeModal()" data-i18n="act_merge_groups"></button>
        </div>

        <div class="report-panel" id="grp-report" data-empty=""></div>

let LANG = localStorage.getItem('biro26_lang') || 'ro';
let currentTab = 'source';

let selectedProfileId = null;

function t(key) { return (I18N[LANG] && I18N[LANG][key]) || (I18N.ro[key]) || key; }

/* =====================================================================
   LANG SWITCH / RENDER
   ===================================================================== */
function setLang(l) {
  LANG = l;
  localStorage.setItem('biro26_lang', l);
  ['ru','ro','en'].forEach(x => document.getElementById('lang-'+x).classList.toggle('active', x===l));
  renderI18n();
}

function renderI18n() {
  document.title = t('app_title');
  document.getElementById('t-app-title').textContent = t('app_title');
  document.getElementById('t-back').textContent = t('back');

  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.setAttribute('placeholder', t(el.getAttribute('data-i18n-ph')));
  });
  document.getElementById('sb-panel').textContent = currentTab;
  // re-render dynamic bits that embed i18n strings
  renderActiveProfileIndicator();
}

/* =====================================================================
   TABS
   ===================================================================== */
const TABS = ['source','dict','groups','prices','mapping'];

function showTab(id) {
  TABS.forEach(x => {
    document.getElementById('panel-'+x)?.classList.remove('active');
    document.getElementById('tab-'+x)?.classList.remove('active');
  });
  document.getElementById('panel-'+id)?.classList.add('active');
  document.getElementById('tab-'+id)?.classList.add('active');
  currentTab = id;
  document.getElementById('sb-panel').textContent = id;
  setStatus('—');

  if (id === 'source')  { loadBrands(); loadFurnizoriFilter(); loadGoods(); }
  if (id === 'dict')    { loadUnivers(); }
  if (id === 'groups')  { loadGroups(); loadSuppliers(); loadFurnizori(); loadCategories(); }
  if (id === 'prices')  { loadPrices(); loadPriceDates(); }
  if (id === 'mapping') { loadProfiles(); }
}

/* =====================================================================
   FETCH HELPERS
   ===================================================================== */
async function fetchJSON(url, opts) {
  opts = opts || {};
  opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  opts.credentials = 'include';
  let r, body;
  try {
    r = await fetch(url, opts);
    body = await r.json();
  } catch (e) {
    toast(t('err_generic') + ': ' + e.message, 'err');
    return {success:false, error:e.message};
  }
  if (!body.success) {
    toast(t('err_generic') + ': ' + (body.error || ('HTTP '+r.status)), 'err');
  }
  return body;
}

function apiGet(url) { return fetchJSON(url, {method:'GET'}); }
function apiPost(url, body) { return fetchJSON(url, {method:'POST', body: JSON.stringify(body||{})}); }
function apiPut(url, body) { return fetchJSON(url, {method:'PUT', body: JSON.stringify(body||{})}); }

function confirmAction(msgKey) {
  return window.confirm(t(msgKey));
}

/* generic "confirm then POST then render output[] into report panel" helper */
async function confirmAndRun(msgKey, url, bodyOrFn, reportElId) {
  if (!confirmAction(msgKey)) return;
  const body = (typeof bodyOrFn === 'function') ? bodyOrFn() : bodyOrFn;
  setStatus(t('loading'));
  const r = await apiPost(url, body);
  renderReport(reportElId, r);
  setStatus(r.success ? t('ok_generic') : t('err_generic'));
  return r;
}

function renderReport(elId, r) {
  const el = document.getElementById(elId);
  if (!el) return;
  const lines = (r && (r.output || r.data)) || [];
  if (!r.success) {
    el.innerHTML = '<span class="ln-err">' + escapeHtml(r.error || t('err_generic')) + '</span>';
    return;
  }
  if (!lines.length) {
    el.innerHTML = '<span class="ln-ok">' + t('ok_generic') + '</span>';
    return;
  }
  el.innerHTML = lines.map(l => {
    const s = String(l);
    const cls = /error|eroare|ошибк/i.test(s) ? 'ln-err' : '';
    return '<div class="'+cls+'">' + escapeHtml(s) + '</div>';
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =====================================================================
   TOAST / STATUS
   ===================================================================== */
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'ok');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3800);
}
function setStatus(msg) { document.getElementById('sb-status').textContent = msg; }

/* data-name fallback: RO denumirea, else RU namerus */
function dispName(row) {
  return row.denumirea || row.namerus || '';
}

function badgeStatus(s) {
  const cls = {NEW:'badge-new', IN_DICT:'badge-indict', CONFLICT:'badge-conflict'}[s] || 'badge-default';
  const label = {NEW:'status_new', IN_DICT:'status_indict', CONFLICT:'status_conflict'}[s];
  return '<span class="badge '+cls+'">' + (label ? t(label) : (s||'—')) + '</span>';
}

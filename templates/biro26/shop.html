<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biro26 — Magazin</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:#f8fafc;color:#1e293b}
.top{position:sticky;top:0;z-index:50;background:#0d0d1a;color:#e2e8f0;display:flex;align-items:center;gap:12px;padding:10px 16px}
.top .logo{font-weight:700;color:#4f8ef7}
.top .sp{flex:1}
.top button,.top .who{background:rgba(255,255,255,.08);border:none;color:#e2e8f0;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.badge{background:#22c55e;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.wrap{max-width:1280px;margin:16px auto;padding:0 14px}
.shoplay{display:grid;grid-template-columns:250px 1fr;gap:18px;align-items:start}
@media(max-width:820px){.shoplay{grid-template-columns:1fr}}
.side{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px;font-size:13px;position:sticky;top:60px;max-height:calc(100vh - 76px);overflow-y:auto}
.side h4{font-size:13px;margin:12px 0 6px;color:#0f172a}
.side h4:first-child{margin-top:0}
.side .fac{display:block;padding:3px 4px;border-radius:5px;color:#334155;cursor:pointer;text-decoration:none}
.side .fac:hover{background:#f1f5f9}
.side .fac.on{color:#1d4ed8;font-weight:700}
.side .fac .cnt{color:#94a3b8;font-size:11.5px}
.side .sub{margin-left:14px}
.side label.fac{display:flex;align-items:center;gap:6px}
.side .plink{display:block;padding:2px 4px;color:#334155;cursor:pointer;border-radius:5px}
.side .plink:hover{background:#f1f5f9}
.side .plink.on{color:#1d4ed8;font-weight:700}
.side .prow{display:flex;gap:6px;margin-top:6px;align-items:center}
.side .prow input{width:70px;padding:5px 7px;border:1px solid #e2e8f0;border-radius:6px;font-size:12.5px}
.side .clr{color:#1d4ed8;cursor:pointer;font-size:12px;display:inline-block;margin-top:4px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{background:#e0e7ff;color:#3730a3;border-radius:14px;padding:3px 10px;font-size:12px;cursor:pointer}
.chip:hover{background:#c7d2fe}
.bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.bar input{flex:1;min-width:220px;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.cardp{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px}
.cardp img{width:100%;height:130px;object-fit:contain;border-radius:6px;background:#f1f5f9}
.cardp .nm{font-size:12.5px;line-height:1.35;min-height:34px}
.cardp .pr{font-weight:700;font-size:15px}
.cardp .row{display:flex;gap:6px;align-items:center}
.cardp input{width:64px;padding:6px;border:1px solid #e2e8f0;border-radius:6px}
.cardp .varsel{width:100%;padding:6px;border:1px solid #c7d2fe;border-radius:6px;background:#eef2ff;font-size:12px;color:#3730a3}
.btn{background:#1d4ed8;color:#fff;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn.gray{background:#e2e8f0;color:#1e293b}
.btn.green{background:#15803d}
.btn:disabled{opacity:.5;cursor:not-allowed}
.more{display:block;margin:16px auto;padding:9px 22px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;width:460px;max-width:94vw;max-height:92vh;overflow:auto;padding:18px}
.modal h3{margin-bottom:12px}
.modal label{display:block;font-size:12px;color:#475569;margin:8px 0 3px}
.modal input{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px}
.modal .acts{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:7px 8px;border-bottom:1px solid #f1f5f9;text-align:left}
td.num,th.num{text-align:right}
.muted{color:#64748b}
.toast{position:fixed;bottom:20px;right:16px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:8px;z-index:200;font-size:13px}
.toast.err{background:#dc2626}
.ok-box{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:12px;margin-top:10px;font-size:14px}
</style>
</head>
<body>

<div class="top">
  <span class="logo">Biro26 · Magazin</span>
  <span class="sp"></span>
  <span class="who" id="who" style="display:none"></span>
  <button id="btn-auth" onclick="openAuth()">Intrare / Înregistrare</button>
  <button onclick="openCart()">🛒 Coș <span class="badge" id="cart-n">0</span></button>
</div>

<div class="wrap">
  <div class="shoplay">
    <aside class="side">
      <h4>Categorii · Категории</h4>
      <div id="f-tree"><span class="muted">…</span></div>
      <h4>Brand</h4>
      <div id="f-brands"><span class="muted">…</span></div>
      <h4>Preț (LEI) · Цена</h4>
      <div id="f-price"></div>
      <div class="prow">
        <input id="f-pmin" type="number" min="0" placeholder="Min">
        <span>–</span>
        <input id="f-pmax" type="number" min="0" placeholder="Max">
        <button class="btn gray" style="padding:5px 10px" onclick="applyPriceInputs()">OK</button>
      </div>
      <span class="clr" onclick="resetFilters()">✕ Resetează filtrele · Сбросить фильтры</span>
    </aside>
    <main>
      <div class="bar">
        <input id="q" placeholder="Căutare: denumire / articol / cod de bare · Поиск: название / артикул / штрихкод"
               oninput="debSearch()">
      </div>
      <div class="chips" id="chips"></div>
      <div class="grid" id="grid"></div>
      <button class="btn gray more" id="more" onclick="loadMore()">Mai multe · Ещё</button>
    </main>
  </div>
</div>

<!-- auth modal -->
<div class="modal-bg" id="m-auth" onclick="this.classList.remove('open')">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="auth-title">Intrare · Вход</h3>
    <div id="reg-extra" style="display:none">
      <label>Nume complet · ФИО</label><input id="a-name">
      <label>Telefon · Телефон</label><input id="a-phone">
    </div>
    <label>Email</label><input id="a-email" type="email">
    <label>Parola · Пароль (min 6)</label><input id="a-pwd" type="password">
    <div class="acts">
      <button class="btn gray" id="a-toggle" onclick="toggleReg()">Înregistrare nouă · Регистрация</button>
      <button class="btn" onclick="doAuth()">OK</button>
    </div>
  </div>
</div>

<!-- cart modal -->
<div class="modal-bg" id="m-cart" onclick="this.classList.remove('open')">
  <div class="modal" style="width:640px" onclick="event.stopPropagation()">
    <h3>🛒 Coș · Корзина</h3>
    <table>
      <thead><tr><th>Produs</th><th class="num">Preț</th><th class="num">Cant.</th>
        <th class="num">Suma</th><th></th></tr></thead>
      <tbody id="cart-body"></tbody>
      <tfoot><tr><th colspan="3" class="num">Total:</th>
        <th class="num" id="cart-total">0</th><th></th></tr></tfoot>
    </table>
    <div id="inv-result"></div>
    <div class="acts">
      <button class="btn gray" onclick="clearCart()">Golește · Очистить</button>
      <button class="btn green" onclick="makeInvoice()">Creează cont de plată · Создать счёт на оплату</button>
    </div>
  </div>
</div>

<script>
const API = '/api/biro26/shop';
const CART_KEY = 'biro26_shop_cart';
let offset = 0, limit = 24, busy = false, qTimer = null, me = null;

function toast(m, err) {
  const d = document.createElement('div');
  d.className = 'toast' + (err ? ' err' : ''); d.textContent = m;
  document.body.appendChild(d); setTimeout(() => d.remove(), 3500);
}
async function j(url, opts) {
  opts = opts || {}; opts.headers = {'Content-Type': 'application/json'}; opts.credentials = 'include';
  const r = await fetch(url, opts); const b = await r.json();
  if (!b.success && b.error) toast(b.error, true);
  return b;
}
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ── facets (Amazon-style sidebar): grupa->categorie, brands, price ── */
const F = { grupa: null, categorie: null, brands: new Set(), pmin: null, pmax: null };
const PRICE_PRESETS = [[null,50,'Până la 50 · До 50'],[50,100,'50 – 100'],
  [100,200,'100 – 200'],[200,500,'200 – 500'],[500,null,'Peste 500 · От 500']];
let treeData = [], brandData = [], brandsExpanded = false;

async function loadFacets() {
  const [tr, br] = await Promise.all([j(API + '/tree'), j(API + '/brands')]);
  treeData = tr.success ? (tr.data || []) : [];
  brandData = br.success ? (br.data || []) : [];
  renderTree(); renderBrands(); renderPricePresets();
}

function renderTree() {
  const box = document.getElementById('f-tree');
  const groups = {};
  treeData.forEach(r => {
    if (!groups[r.grupa]) groups[r.grupa] = {n: 0, cats: []};
    groups[r.grupa].n += r.cnt || 0;
    groups[r.grupa].cats.push(r);
  });
  let h = '<a class="fac' + (!F.grupa ? ' on' : '') + '" onclick="setGroup(null,null)">Toate · Все</a>';
  Object.keys(groups).sort().forEach(g => {
    const on = F.grupa === g;
    h += '<a class="fac' + (on && !F.categorie ? ' on' : '') + '" onclick="setGroup(' + qarg(g) + ',null)">' +
         (on ? '▾ ' : '▸ ') + esc(g) + ' <span class="cnt">(' + groups[g].n + ')</span></a>';
    if (on) groups[g].cats.forEach(c => {
      h += '<a class="fac sub' + (F.categorie === c.categorie ? ' on' : '') + '" ' +
           'onclick="setGroup(' + qarg(g) + ',' + qarg(c.categorie) + ')">' +
           esc(c.categorie || '—') + ' <span class="cnt">(' + (c.cnt || 0) + ')</span></a>';
    });
  });
  box.innerHTML = h;
}

function renderBrands() {
  const box = document.getElementById('f-brands');
  const list = brandsExpanded ? brandData : brandData.slice(0, 12);
  box.innerHTML = list.map(b =>
    '<label class="fac"><input type="checkbox"' + (F.brands.has(b.brand) ? ' checked' : '') +
    ' onchange="toggleBrand(' + qarg(b.brand) + ')"> ' + esc(b.brand) +
    ' <span class="cnt">(' + (b.cnt || 0) + ')</span></label>').join('') +
    (brandData.length > 12
      ? '<span class="clr" onclick="brandsExpanded=!brandsExpanded;renderBrands()">' +
        (brandsExpanded ? '▲ Mai puțin · Меньше' : '▼ Mai multe · Больше (' + brandData.length + ')') + '</span>'
      : '');
}

function renderPricePresets() {
  document.getElementById('f-price').innerHTML = PRICE_PRESETS.map((p, i) =>
    '<span class="plink' + (F.pmin === p[0] && F.pmax === p[1] ? ' on' : '') +
    '" onclick="setPrice(' + (p[0] ?? 'null') + ',' + (p[1] ?? 'null') + ')">' + p[2] + '</span>').join('');
}

/* safe string arg for inline onclick */
function qarg(s){ return s == null ? 'null' : "'" + String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;') + "'"; }

function setGroup(g, c) { F.grupa = g; F.categorie = c; renderTree(); apply(); }
function toggleBrand(b) { F.brands.has(b) ? F.brands.delete(b) : F.brands.add(b); apply(); }
function setPrice(mn, mx) {
  F.pmin = mn; F.pmax = mx;
  document.getElementById('f-pmin').value = mn ?? '';
  document.getElementById('f-pmax').value = mx ?? '';
  renderPricePresets(); apply();
}
function applyPriceInputs() {
  const mn = parseFloat(document.getElementById('f-pmin').value);
  const mx = parseFloat(document.getElementById('f-pmax').value);
  F.pmin = isNaN(mn) ? null : mn; F.pmax = isNaN(mx) ? null : mx;
  renderPricePresets(); apply();
}
function resetFilters() {
  F.grupa = F.categorie = F.pmin = F.pmax = null; F.brands.clear();
  document.getElementById('f-pmin').value = ''; document.getElementById('f-pmax').value = '';
  renderTree(); renderBrands(); renderPricePresets(); apply();
}
function apply(){ renderChips(); load(true); }

function renderChips() {
  const chips = [];
  if (F.grupa) chips.push(['📁 ' + F.grupa + (F.categorie ? ' › ' + F.categorie : ''), "setGroup(null,null)"]);
  F.brands.forEach(b => chips.push([b, 'toggleBrand(' + qarg(b) + ');renderBrands()']));
  if (F.pmin != null || F.pmax != null)
    chips.push([(F.pmin ?? 0) + ' – ' + (F.pmax ?? '∞') + ' LEI', 'setPrice(null,null)']);
  document.getElementById('chips').innerHTML = chips.map(c =>
    '<span class="chip" onclick="' + c[1] + '">' + esc(c[0]) + ' ✕</span>').join('');
}

/* ── catalog ─────────────────────────────────────────────── */
function debSearch(){ clearTimeout(qTimer); qTimer = setTimeout(() => load(true), 400); }
let loadSeq = 0;   // rapid facet clicks: the LATEST request wins, stale responses are dropped
async function load(reset) {
  if (!reset && busy) return;              // only guard the "load more" path
  const my = ++loadSeq;
  busy = true;
  if (reset) { offset = 0; document.getElementById('grid').innerHTML = ''; }
  const qs = new URLSearchParams({limit, offset});
  const q = document.getElementById('q').value.trim();
  if (q) qs.set('search', q);
  if (F.grupa) qs.set('grupa', F.grupa);
  if (F.categorie) qs.set('categorie', F.categorie);
  if (F.brands.size) qs.set('brand', Array.from(F.brands).join(','));
  if (F.pmin != null) qs.set('price_min', F.pmin);
  if (F.pmax != null) qs.set('price_max', F.pmax);
  const r = await j(API + '/products?' + qs);
  if (my !== loadSeq) return;              // superseded by a newer filter click
  busy = false;
  if (!r.success) return;
  const rows = r.data || [];
  offset += rows.length;
  document.getElementById('more').style.display = rows.length === limit ? '' : 'none';
  document.getElementById('grid').insertAdjacentHTML('beforeend', rows.map(p => {
    const price = parseFloat(String(p.retail1 || '').replace(',', '.')) || 0;
    // RO/EN: familii de variante — selector de caracteristică (culoare/material)
    const varSel = (p.var_cnt || 1) > 1
      ? '<select class="varsel" id="v-' + p.cod + '" onfocus="loadVariants(' + p.cod + ')">' +
        '<option value="' + p.cod + '">' + esc(p.variant || '—') + ' (' + p.var_cnt + ' variante ▾)</option></select>'
      : '';
    return '<div class="cardp">' +
      (p.image ? '<img loading="lazy" referrerpolicy="no-referrer" src="' + esc(p.image) + '" onerror="this.style.visibility=\'hidden\'">' : '<div style="height:130px"></div>') +
      '<div class="nm">' + esc(p.denumirea || p.namerus || '') + '</div>' +
      '<div class="muted" style="font-size:11px">' + esc(p.codvechi || '') + (p.barcode ? ' · ' + esc(p.barcode) : '') + '</div>' +
      varSel +
      '<div class="row"><span class="pr">' + price.toFixed(2) + ' LEI</span><span style="flex:1"></span>' +
      '<input type="number" min="1" value="1" id="q-' + p.cod + '">' +
      '<button class="btn" onclick="addCart(' + p.cod + ',\'' + esc(p.denumirea || '').replace(/'/g, '&#39;') + '\',' + price + ')">+🛒</button></div>' +
      '</div>';
  }).join(''));
}
function loadMore(){ load(false); }

/* ── cart (localStorage) ─────────────────────────────────── */
function cart(){ try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch(e){ return []; } }
function saveCart(c){ localStorage.setItem(CART_KEY, JSON.stringify(c));
  document.getElementById('cart-n').textContent = c.length; }
/* variant families: load the characteristic list on first focus */
const varCache = {};
async function loadVariants(cod) {
  const sel = document.getElementById('v-' + cod);
  if (!sel || sel.dataset.loaded) return;
  sel.dataset.loaded = '1';
  const r = varCache[cod] || await j(API + '/variants?cod=' + cod);
  varCache[cod] = r;
  if (!r.success || !(r.data || []).length) return;
  const cur = sel.value;
  sel.innerHTML = r.data.map(v =>
    '<option value="' + v.cod_univers + '" data-name="' + esc(v.full_name || v.base_name || '') + '"' +
    (String(v.cod_univers) === String(cur) ? ' selected' : '') + '>' +
    esc(v.variant || v.full_name || ('#' + v.cod_univers)) + '</option>').join('');
}

function addCart(cod, name, price) {
  const q = parseFloat((document.getElementById('q-' + cod) || {}).value) || 1;
  // RO/EN: daca produsul are variante, in cos intra COD-ul variantei alese
  const sel = document.getElementById('v-' + cod);
  let realCod = cod, realName = name;
  if (sel && sel.dataset.loaded) {
    realCod = parseInt(sel.value, 10) || cod;
    const opt = sel.options[sel.selectedIndex];
    if (opt) realName = (opt.dataset.name || name) ||
                        (name + ' · ' + opt.textContent.trim());
  }
  const c = cart(); const ex = c.find(i => i.cod === realCod);
  if (ex) ex.qty += q; else c.push({cod: realCod, name: realName, price, qty: q});
  saveCart(c); toast('Adăugat · Добавлено: ' + q);
}
function renderCart() {
  const c = cart(); let total = 0;
  document.getElementById('cart-body').innerHTML = c.map(i => {
    const s = i.qty * i.price; total += s;
    return '<tr><td>' + esc(i.name) + '</td><td class="num">' + i.price.toFixed(2) + '</td>' +
      '<td class="num"><input type="number" min="0" style="width:64px" value="' + i.qty + '" ' +
      'onchange="setQty(' + i.cod + ', this.value)"></td>' +
      '<td class="num">' + s.toFixed(2) + '</td>' +
      '<td><button class="btn gray" onclick="delItem(' + i.cod + ')">×</button></td></tr>';
  }).join('') || '<tr><td colspan="5" class="muted">Coșul este gol · Корзина пуста</td></tr>';
  document.getElementById('cart-total').textContent = total.toFixed(2) + ' LEI';
}
function setQty(cod, v){ const c = cart(); const i = c.find(x => x.cod === cod);
  if (i) { i.qty = parseFloat(v) || 0; saveCart(c); renderCart(); } }
function delItem(cod){ saveCart(cart().filter(x => x.cod !== cod)); renderCart(); }
function clearCart(){ saveCart([]); renderCart(); }
function openCart(){ document.getElementById('inv-result').innerHTML = ''; renderCart();
  document.getElementById('m-cart').classList.add('open'); }

/* ── auth ────────────────────────────────────────────────── */
let regMode = false;
function openAuth(){ document.getElementById('m-auth').classList.add('open'); }
function toggleReg(){ regMode = !regMode;
  document.getElementById('reg-extra').style.display = regMode ? '' : 'none';
  document.getElementById('auth-title').textContent = regMode ? 'Înregistrare · Регистрация' : 'Intrare · Вход';
  document.getElementById('a-toggle').textContent = regMode ? '← Intrare · Вход' : 'Înregistrare nouă · Регистрация'; }
async function doAuth() {
  const email = document.getElementById('a-email').value.trim();
  const pwd = document.getElementById('a-pwd').value;
  let r;
  if (regMode) {
    r = await j(API + '/register', {method: 'POST', body: JSON.stringify({
      email, password: pwd,
      full_name: document.getElementById('a-name').value.trim(),
      phone: document.getElementById('a-phone').value.trim()})});
  } else {
    r = await j(API + '/login', {method: 'POST', body: JSON.stringify({email, password: pwd})});
  }
  if (r.success) { document.getElementById('m-auth').classList.remove('open'); refreshMe(); }
}
async function refreshMe() {
  const r = await j(API + '/me');
  me = r.data;
  document.getElementById('who').style.display = me ? '' : 'none';
  document.getElementById('btn-auth').textContent = me ? 'Ieșire · Выход' : 'Intrare / Înregistrare';
  if (me) { document.getElementById('who').textContent = '👤 ' + me.name;
    document.getElementById('btn-auth').onclick = async () => { await j(API + '/logout', {method:'POST'}); location.reload(); };
  } else document.getElementById('btn-auth').onclick = openAuth;
}

/* ── invoice ("cont de plata") ───────────────────────────── */
async function makeInvoice() {
  const c = cart().filter(i => i.qty > 0);
  if (!c.length) { toast('Coșul este gol · Корзина пуста', true); return; }
  if (!me) { document.getElementById('m-cart').classList.remove('open'); openAuth(); return; }
  const r = await j(API + '/invoice', {method: 'POST', body: JSON.stringify({
    items: c.map(i => ({cod: i.cod, qty: i.qty, name: i.name}))})});
  if (r.success) {
    document.getElementById('inv-result').innerHTML =
      '<div class="ok-box">✅ Cont de plată creat · Счёт на оплату создан:<br>' +
      '<b>Nr. ' + r.data.nrset + '</b> (document COD ' + r.data.cod + ')</div>';
    saveCart([]); renderCart();
  }
}

saveCart(cart()); refreshMe(); load(true); loadFacets();
</script>
</body>
</html>

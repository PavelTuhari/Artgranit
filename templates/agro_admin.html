<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGRO Admin</title>
<style>
  :root { --primary: #059669; --primary-dark: #047857; --bg: #f0fdf4; --sidebar-bg: #064e3b; --sidebar-text: #d1fae5; --white: #fff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--sidebar-bg); color: var(--sidebar-text); padding: 20px 0; flex-shrink: 0; }
  .sidebar h2 { padding: 0 20px 16px; font-size: 18px; color: var(--white); border-bottom: 1px solid rgba(255,255,255,.15); margin-bottom: 8px; }
  .sidebar a { display: block; padding: 10px 20px; color: var(--sidebar-text); text-decoration: none; font-size: 14px; transition: background .15s; }
  .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,.12); color: var(--white); }
  .main { flex: 1; padding: 32px 40px; }
  .main h1 { color: var(--primary-dark); margin-bottom: 8px; }
  .main p { color: #374151; }
</style>
</head>

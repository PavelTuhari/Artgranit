<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGRO MDI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ===== Top Bar ===== */
.top-bar {
    background: #0d0d1a;
    border-bottom: 1px solid #0f3460;
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 6px;
    flex-shrink: 0;
    z-index: 500;
}
.top-bar .logo {
    color: #53d769;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 1.5px;
    margin-right: 12px;
}
.top-bar .logo span { color: #e94560; }
.top-bar .spacer { flex: 1; }
.back-link {
    color: #8888aa;
    text-decoration: none;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.back-link:hover { color: #e94560; }

/* ===== Tab Bar ===== */
.tab-bar {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    height: 36px;
    display: flex;
    align-items: stretch;
    padding: 0 8px;
    gap: 2px;
    flex-shrink: 0;
    overflow-x: auto;
}
.tab-bar::-webkit-scrollbar { height: 0; }
.mdi-tab {
    padding: 0 18px;
    cursor: pointer;
    color: #8888aa;
    font-size: 12px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    user-select: none;
    position: relative;
}
.mdi-tab:hover { color: #e0e0e0; background: #0f346040; }
.mdi-tab.active {
    color: #fff;
    border-bottom-color: #e94560;
    background: #0f346060;
}
.mdi-tab .tab-icon { font-size: 14px; }
.mdi-tab .tab-close {
    display: none;
    margin-left: 6px;
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: none;
    background: none;
    color: #8888aa;
    font-size: 14px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
}
.mdi-tab:hover .tab-close { display: inline-block; }
.mdi-tab .tab-close:hover { background: #e9456040; color: #e94560; }

/* ===== Quick Actions Bar ===== */
.actions-bar {
    background: #12122a;
    border-bottom: 1px solid #0f3460;
    height: 32px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
    flex-shrink: 0;
}
.action-btn {
    padding: 3px 10px;
    background: #16213e;
    border: 1px solid #0f3460;
    color: #b0b0c8;
    font-size: 11px;
    border-radius: 3px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: all .15s;
}
.action-btn:hover { background: #0f3460; color: #fff; border-color: #e94560; }
.action-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
.actions-bar .sep {
    width: 1px;
    height: 18px;
    background: #0f3460;
    margin: 0 4px;
}
.actions-bar .status {
    font-size: 11px;
    color: #6c6c8a;
    margin-left: auto;
}
.actions-bar .status .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #53d769;
    margin-right: 4px;
    vertical-align: middle;
}

/* ===== MDI Container ===== */
.mdi-container {
    flex: 1;
    position: relative;
    overflow: hidden;
}

/* ===== Tab Panels (iframe mode) ===== */
.tab-panel {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
}
.tab-panel.active { display: block; }
.tab-panel iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #1a1a2e;
}

/* ===== Floating windows ===== */
.mdi-window {
    position: absolute;
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    display: none;
    flex-direction: column;
    min-width: 320px;
    min-height: 220px;
    overflow: hidden;
}
.mdi-window.open { display: flex; }
.mdi-window.maximized {
    top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important;
    border-radius: 0;
}
.mdi-window-header {
    background: #0d0d1a;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    cursor: move;
    user-select: none;
    gap: 8px;
    border-bottom: 1px solid #0f3460;
}
.mdi-window-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: #e0e0e0;
}
.mdi-window-btn {
    width: 22px; height: 22px;
    border: none;
    background: #16213e;
    color: #8888aa;
    cursor: pointer;
    border-radius: 3px;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
}
.mdi-window-btn:hover { background: #0f3460; color: #fff; }
.mdi-window-btn.close:hover { background: #e94560; color: #fff; }
.mdi-window-content {
    flex: 1;
    overflow: auto;
    position: relative;
}
.mdi-window-content iframe {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border: none;
}

/* ===== Status Bar ===== */
.status-bar {
    background: #0d0d1a;
    border-top: 1px solid #0f3460;
    height: 24px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    flex-shrink: 0;
    font-size: 11px;
    color: #6c6c8a;
}
.status-bar .status-item { display: inline-flex; align-items: center; gap: 4px; }
.status-bar .status-item .green { color: #53d769; }
.status-bar .status-item .red { color: #e94560; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
    .actions-bar { display: none; }
    .mdi-tab { padding: 0 12px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- ===== Top Bar ===== -->
<div class="top-bar">
    <div class="logo">AGRO<span>MDI</span></div>
    <div class="spacer"></div>
    <a href="/UNA.md/orasldev" class="back-link">&#8592; SQL Developer</a>
</div>

<!-- ===== Tab Bar ===== -->
<div class="tab-bar" id="tabBar">
    <div class="mdi-tab active" data-tab="admin" onclick="activateTab('admin')">
        <span class="tab-icon">&#9881;</span> Admin
    </div>
    <div class="mdi-tab" data-tab="field" onclick="activateTab('field')">
        <span class="tab-icon">&#128230;</span> Приёмка
    </div>
    <div class="mdi-tab" data-tab="warehouse" onclick="activateTab('warehouse')">
        <span class="tab-icon">&#127970;</span> Склад
    </div>
    <div class="mdi-tab" data-tab="qa" onclick="activateTab('qa')">
        <span class="tab-icon">&#9989;</span> QA / HACCP
    </div>
    <div class="mdi-tab" data-tab="sales" onclick="activateTab('sales')">
        <span class="tab-icon">&#128176;</span> Продажи
    </div>
</div>

<!-- ===== Actions Bar ===== -->
<div class="actions-bar">
    <button class="action-btn" onclick="openFloatingWindow('scale', 'Весы / Scale', '/UNA.md/orasldev/agro-field#scale', 500, 600)">&#9878; Весы</button>
    <button class="action-btn" onclick="openFloatingWindow('reports', 'Отчёты / Reports', '/UNA.md/orasldev/agro-admin#reports', 700, 500)">&#128200; Отчёты</button>
    <button class="action-btn" onclick="openFloatingWindow('readings', 'Показания / Readings', '/UNA.md/orasldev/agro-warehouse#readings', 600, 450)">&#127777; Показания</button>
    <div class="sep"></div>
    <button class="action-btn" onclick="tileWindows()">&#9638; Tile</button>
    <button class="action-btn" onclick="cascadeWindows()">&#10697; Cascade</button>
    <button class="action-btn" onclick="closeAllWindows()">&#10005; Close All</button>
    <div class="status">
        <span class="dot"></span>Oracle connected
    </div>
</div>

<!-- ===== MDI Container ===== -->
<div class="mdi-container" id="mdiContainer">
    <!-- Tab panels (lazy-loaded iframes) -->
    <div class="tab-panel active" id="panel-admin" data-src="/UNA.md/orasldev/agro-admin?embed=1"></div>
    <div class="tab-panel" id="panel-field" data-src="/UNA.md/orasldev/agro-field?embed=1"></div>
    <div class="tab-panel" id="panel-warehouse" data-src="/UNA.md/orasldev/agro-warehouse?embed=1"></div>
    <div class="tab-panel" id="panel-qa" data-src="/UNA.md/orasldev/agro-qa?embed=1"></div>
    <div class="tab-panel" id="panel-sales" data-src="/UNA.md/orasldev/agro-sales?embed=1"></div>

    <!-- Floating windows are appended here dynamically -->
</div>

<!-- ===== Status Bar ===== -->
<div class="status-bar">
    <div class="status-item"><span class="green">AGRO</span> Module</div>
    <div class="status-item" id="statusTabs">Tabs: 5</div>
    <div class="status-item" id="statusWindows">Windows: 0</div>
    <div class="status-item" id="statusTime"></div>
</div>

<!-- ===== JavaScript ===== -->
<script>
(function() {
'use strict';

var zIndex = 200;
var floatingWindows = {};
var loadedPanels = {};

/* ========== TAB MANAGEMENT ========== */

function activateTab(name) {
    // Switch tab highlight
    document.querySelectorAll('.mdi-tab').forEach(function(t) { t.classList.remove('active'); });
    var tab = document.querySelector('.mdi-tab[data-tab="' + name + '"]');
    if (tab) tab.classList.add('active');

    // Switch panel
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    var panel = document.getElementById('panel-' + name);
    if (panel) {
        panel.classList.add('active');
        // Lazy load iframe
        if (!loadedPanels[name]) {
            var src = panel.getAttribute('data-src');
            if (src) {
                var iframe = document.createElement('iframe');
                iframe.src = src;
                iframe.setAttribute('loading', 'lazy');
                panel.appendChild(iframe);
                loadedPanels[name] = true;
            }
        }
    }
}
window.activateTab = activateTab;

// Load first tab on init
activateTab('admin');

/* ========== FLOATING WINDOWS ========== */

function openFloatingWindow(id, title, url, width, height) {
    if (floatingWindows[id]) {
        // If already open, bring to front
        var existing = document.getElementById('mdi-win-' + id);
        if (existing) {
            existing.classList.add('open');
            existing.style.zIndex = zIndex++;
            return;
        }
    }

    width = width || 600;
    height = height || 400;

    var container = document.getElementById('mdiContainer');
    var cw = container.clientWidth;
    var ch = container.clientHeight;

    // Position: center with offset for cascade
    var count = Object.keys(floatingWindows).length;
    var left = Math.min(50 + count * 30, cw - width - 20);
    var top = Math.min(30 + count * 30, ch - height - 20);

    var win = document.createElement('div');
    win.className = 'mdi-window open';
    win.id = 'mdi-win-' + id;
    win.style.width = width + 'px';
    win.style.height = height + 'px';
    win.style.left = Math.max(0, left) + 'px';
    win.style.top = Math.max(0, top) + 'px';
    win.style.zIndex = zIndex++;

    win.innerHTML =
        '<div class="mdi-window-header">' +
            '<div class="mdi-window-title">' + title + '</div>' +
            '<button class="mdi-window-btn" onclick="maximizeWin(\'' + id + '\')" title="Maximize">&#9633;</button>' +
            '<button class="mdi-window-btn close" onclick="closeWin(\'' + id + '\')" title="Close">&#10005;</button>' +
        '</div>' +
        '<div class="mdi-window-content">' +
            '<iframe src="' + url + '"></iframe>' +
        '</div>';

    container.appendChild(win);
    floatingWindows[id] = win;
    makeDraggable(win);
    updateStatusBar();
}
window.openFloatingWindow = openFloatingWindow;

function closeWin(id) {
    var win = document.getElementById('mdi-win-' + id);
    if (win) {
        win.remove();
        delete floatingWindows[id];
        updateStatusBar();
    }
}
window.closeWin = closeWin;

function maximizeWin(id) {
    var win = document.getElementById('mdi-win-' + id);
    if (win) win.classList.toggle('maximized');
}
window.maximizeWin = maximizeWin;

function closeAllWindows() {
    Object.keys(floatingWindows).forEach(function(id) { closeWin(id); });
}
window.closeAllWindows = closeAllWindows;

function tileWindows() {
    var ids = Object.keys(floatingWindows);
    if (!ids.length) return;
    var container = document.getElementById('mdiContainer');
    var cw = container.clientWidth;
    var ch = container.clientHeight;
    var cols = Math.ceil(Math.sqrt(ids.length));
    var rows = Math.ceil(ids.length / cols);
    var w = Math.floor(cw / cols);
    var h = Math.floor(ch / rows);

    ids.forEach(function(id, i) {
        var win = floatingWindows[id];
        if (!win) return;
        win.classList.remove('maximized');
        var col = i % cols;
        var row = Math.floor(i / cols);
        win.style.left = (col * w) + 'px';
        win.style.top = (row * h) + 'px';
        win.style.width = w + 'px';
        win.style.height = h + 'px';
    });
}
window.tileWindows = tileWindows;

function cascadeWindows() {
    var ids = Object.keys(floatingWindows);
    ids.forEach(function(id, i) {
        var win = floatingWindows[id];
        if (!win) return;
        win.classList.remove('maximized');
        win.style.left = (30 + i * 30) + 'px';
        win.style.top = (20 + i * 30) + 'px';
        win.style.width = '600px';
        win.style.height = '400px';
        win.style.zIndex = zIndex++;
    });
}
window.cascadeWindows = cascadeWindows;

/* ========== DRAG ========== */

function makeDraggable(win) {
    var header = win.querySelector('.mdi-window-header');
    var isDragging = false;
    var startX, startY, origLeft, origTop;

    header.addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'BUTTON') return;
        isDragging = true;
        win.style.zIndex = zIndex++;
        startX = e.clientX;
        startY = e.clientY;
        origLeft = win.offsetLeft;
        origTop = win.offsetTop;
        // Prevent iframe from stealing events
        document.querySelectorAll('iframe').forEach(function(f) { f.style.pointerEvents = 'none'; });
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        if (win.classList.contains('maximized')) return;
        var dx = e.clientX - startX;
        var dy = e.clientY - startY;
        win.style.left = (origLeft + dx) + 'px';
        win.style.top = (origTop + dy) + 'px';
    });

    document.addEventListener('mouseup', function() {
        if (isDragging) {
            isDragging = false;
            document.querySelectorAll('iframe').forEach(function(f) { f.style.pointerEvents = ''; });
        }
    });
}

/* ========== STATUS BAR ========== */

function updateStatusBar() {
    var wc = Object.keys(floatingWindows).length;
    document.getElementById('statusWindows').textContent = 'Windows: ' + wc;
}

function updateClock() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('statusTime').textContent = h + ':' + m;
}
setInterval(updateClock, 30000);
updateClock();

/* ========== KEYBOARD SHORTCUTS ========== */

document.addEventListener('keydown', function(e) {
    // Ctrl+1..5 — switch tabs
    if (e.ctrlKey && e.key >= '1' && e.key <= '5') {
        e.preventDefault();
        var tabs = ['admin', 'field', 'warehouse', 'qa', 'sales'];
        activateTab(tabs[parseInt(e.key) - 1]);
    }
    // Escape — close topmost floating window
    if (e.key === 'Escape') {
        var ids = Object.keys(floatingWindows);
        if (ids.length) closeWin(ids[ids.length - 1]);
    }
});

})();
</script>
</body>
</html>
